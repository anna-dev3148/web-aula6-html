<rect x="50" y="50" width="100" height="100" stroke="#000000" stroke-width="5" fill="none" />

<rect x="50" y="50" width="100" height="100" stroke="#000000" stroke-width="5" fill="none" transform="rotate(45 100 100)" />

</svg>