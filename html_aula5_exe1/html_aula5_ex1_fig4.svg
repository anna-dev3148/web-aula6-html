<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sombraSuave" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="50" y="50" width="100" height="100" rx="15" ry="15" 
        stroke="#4facfe" stroke-width="6" fill="#4facfe33" filter="url(#sombraSuave)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="0 100 100" 
      to="360 100 100" 
      dur="5s" 
      repeatCount="indefinite" />
  </rect>
  
  <rect x="50" y="50" width="100" height="100" rx="15" ry="15" 
        stroke="#4facfe" stroke-width="6" fill="#4facfe33" filter="url(#sombraSuave)">
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      from="45 100 100" 
      to="-315 100 100" 
      dur="5s" 
      repeatCount="indefinite" />
  </rect>
</svg>
